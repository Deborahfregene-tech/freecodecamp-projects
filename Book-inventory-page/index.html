<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Book Inventory</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<h1>Book Inventory</h1>
<table>
  <thead>
    </tbody>
  <th>Title</th>
  <th>Author</th>
  <th>Category</th>
  <th>Status</th>
  <th>Rate</th>
</thead>
  <tr class="read">
    <td>The Great Gatsby</td>
    <td>Scott Fitzgerald</td>
    <td>Classic Fiction</td>
    <td> <span class="status">Read</span></td>
    <td> <span class="rate one"><span></span><span></span><span></span></span></td>
    </tr>

     <tr class="to-read">
    <td>Dune</td>
    <td>Frank Herbert</td>
    <td>Fantasy</td>
    <td> <span class="status">To Read</span></td>
    <td> <span class="rate three"><span></span><span></span><span></span></span></td>
    </tr>

     <tr class="in-progress">
    <td>To Kill a Mocking Bird</td>
    <td>Harper Lee</td>
    <td>Classic Fiction</td>
    <td> <span class="status">In Progress</span></td>
    <td> <span class="rate two"><span></span><span></span><span></span></span></td>
    </tr>
    </tbody>

  </table>
</body>

</html>
